<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LinkedIn Banner, Jady Pamella</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* LinkedIn banner: 1584 x 396 px (4:1). Profile photo overlaps bottom-left (~280x280 safe zone). */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --color-primary: #E03859;
            --color-primary-hover: #AF2348;
            --color-secondary: #fec503;
            --color-text-dark: hsl(222.2, 84%, 4.9%);
            --color-text-muted: #666666;
            --color-bg-light: #FFFFFF;
            --color-bg-cream: #F1EADB;
            --color-bg-dark: #222222;
        }
        html, body {
            width: 1584px;
            height: 396px;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--color-text-dark);
            background: var(--color-bg-cream);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .banner {
            width: 1584px;
            height: 396px;
            padding: 56px 200px 64px 460px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
            background: linear-gradient(135deg, var(--color-bg-cream) 0%, #FAF5E9 60%, #FFFFFF 100%);
            position: relative;
        }
        .logo {
            position: absolute;
            top: 38px;
            right: 72px;
            width: 120px;
            height: 120px;
            object-fit: contain;
        }
        .accent-bar-top {
            position: absolute;
            left: 0; top: 0;
            height: 10px;
            width: 100%;
            background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-secondary) 100%);
        }
        .accent-bar-bottom {
            position: absolute;
            left: 0; bottom: 0;
            height: 6px;
            width: 100%;
            background: linear-gradient(90deg, var(--color-secondary) 0%, var(--color-primary) 100%);
        }
        .tag {
            font-size: 17px;
            font-weight: 700;
            color: var(--color-primary);
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }
        h1 {
            font-size: 54px;
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.02em;
            color: var(--color-text-dark);
        }
        h1 .accent { color: var(--color-primary); }
        .subtitle {
            font-size: 22px;
            font-weight: 500;
            color: var(--color-text-muted);
            line-height: 1.35;
            max-width: 1000px;
            margin-top: 2px;
        }
        .credentials {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text-dark);
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .credentials .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--color-primary);
            display: inline-block;
        }
        .cta {
            font-size: 14px;
            font-weight: 700;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 4px;
        }
        .cta .email {
            color: var(--color-text-dark);
            text-transform: none;
            letter-spacing: 0;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="accent-bar-top"></div>
        <img class="logo" src="../images/logo.png" alt="Jady Pamella logo">
        <div class="tag">AI Engineer &middot; AI Safety Researcher</div>
        <h1>Shipping AI products. Researching <span class="accent">AI Safety</span>.</h1>
        <div class="credentials">
            <span>Elsevier 2025</span>
            <span class="dot"></span>
            <span>BlueDot Technical AI Safety</span>
            <span class="dot"></span>
            <span>EA Sweden Fellow 2026</span>
            <span class="dot"></span>
            <span>Founder @SoiQet</span>
        </div>
        <div class="cta">Open to sponsored AI roles in Sweden, EU, UK &middot; <span class="email">hello@jadypamella.com</span></div>
        <div class="accent-bar-bottom"></div>
    </div>
</body>
</html>
