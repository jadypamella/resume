<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OG, Badges, Jady Pamella</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="base.css">
</head>
<body>
    <div class="og">
        <div class="accent-bar"></div>
        <div class="left">
            <div class="tag">Verified Credentials</div>
            <h1>Badges and <span class="accent">Certifications</span></h1>
            <div class="subtitle">Every credential links to its public verification URL on the issuing platform. No screenshots, no claims without proof.</div>
            <div class="meta">
                <span>BlueDot Impact</span><span class="dot"></span>
                <span>Credly</span><span class="dot"></span>
                <span>EXIN</span><span class="dot"></span>
                <span>ISACA</span><span class="dot"></span>
                <span>Certiprof</span>
            </div>
        </div>
        <img class="photo" src="../images/profile.png" alt="Jady Pamella">
        <div class="footer">
            <span class="domain">jadypamella.com/badges</span>
            <span>Validated, publicly verifiable</span>
        </div>
    </div>
</body>
</html>
